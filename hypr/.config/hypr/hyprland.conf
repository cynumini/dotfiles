# basic
monitor=,highrr,auto,auto

# colors
$bg = rgb(282828)
$fg = rgb(EBDBB2)
$purple = rgb(B16286)

# vars
$terminal = footclient
$fileManager = thunar
$menu = wofi --show drun

# autostart
exec-once = hyprpaper
exec-once = waybar
exec-once = hypridle
exec-once = wayland-pipewire-idle-inhibit
exec-once = dunst
exec-once = dex -a
exec-once = playerctld daemon
exec-once = foot --server

# env vars
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = QT_QPA_PLATFORMTHEME,qt6ct

# disable fancy staff
general {
    gaps_in = 0
    gaps_out = 0
    layout = master
    col.inactive_border = $bg
    col.active_border = $purple
}

decoration {
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

animations {
    enabled = no
}

master {
    new_status = master
}

input {
    accel_profile = flat
}

group {
	col.border_active = $purple
	col.border_inactive = $bg
	groupbar {
		gradients = true
		text_color = $fg
		font_family = "Iosevka Nerd Font"
		font_size = 12
		col.active = $purple
		col.inactive = $bg
	}
}

misc {
	disable_hyprland_logo = true
}

# example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = SUPER, Q, exec, $terminal
bind = SUPER SHIFT, C, killactive,
bind = SUPER SHIFT, M, exit,
bind = SUPER, E, exec, $fileManager
bind = SUPER, V, togglefloating,
bind = SUPER, R, exec, $menu
bind = SUPER SHIFT, R, exec, wmenu-run

# switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = SUPER, equal, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = SUPER, minus, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = SUPER, P, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# screenshot
bind = SUPER SHIFT, equal, exec, hyprpicker -a
bind = , Print, exec, screenshot.bash
bind = SUPER SHIFT, S, exec, screenshot.bash region
bind = SUPER, S, exec, screenshot.bash temp

# group and windows
bind = SUPER, T, togglegroup
bind = SUPER, J, cyclenext
bind = SUPER, K, cyclenext, prev
bind = SUPER SHIFT, J, changegroupactive, f
bind = SUPER SHIFT, K, changegroupactive, b
bind = SUPER, right, movewindoworgroup, r
bind = SUPER, left, movewindoworgroup, l
bind = SUPER, up, movewindoworgroup, u
bind = SUPER, down, movewindoworgroup, d

# fullscreen
bind = SUPER, f, fullscreen, 1
bind = SUPER SHIFT, f, fullscreen, 0

# scripts
bind = SUPER, z, exec, transformers_ocr recognize
bind = SUPER, a, exec, tts.py
bind = SUPER, x, exec, record-audio.sh
bind = SUPER, w, exec, work.py

# rules
windowrule = workspace: 2, initialClass: anki, class: anki
windowrule = workspace: 3, class: librewolf
windowrule = workspace: 4, title: User 1 - Anki

# ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
